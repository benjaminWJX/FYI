<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Benjamin's FYI Conversation Starter</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #2C5F2D 0%, #1E2D2F 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: white;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 1.8rem;
      margin-bottom: 8px;
      color: #97BC62;
    }

    .header p {
      font-size: 1rem;
      opacity: 0.9;
    }

    .wheel-container {
      position: relative;
      width: 320px;
      height: 320px;
      margin-bottom: 30px;
    }

    .wheel {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(0,0,0,0.4), 0 0 60px rgba(151, 188, 98, 0.3);
      transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
      border: 6px solid #97BC62;
    }

    .wheel-segment {
      position: absolute;
      width: 50%;
      height: 50%;
      top: 0;
      right: 0;
      transform-origin: bottom left;
      display: flex;
      align-items: center;
      justify-content: center;
      clip-path: polygon(0 100%, 100% 0, 100% 100%);
    }

    .wheel-segment span {
      position: absolute;
      font-size: 0.65rem;
      font-weight: 600;
      color: white;
      text-align: center;
      transform: rotate(67.5deg) translateY(-85px);
      width: 90px;
      line-height: 1.2;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
    }

    .pointer {
      position: absolute;
      top: -15px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 18px solid transparent;
      border-right: 18px solid transparent;
      border-top: 35px solid #B85042;
      z-index: 10;
      filter: drop-shadow(0 3px 6px rgba(0,0,0,0.4));
    }

    .pointer::after {
      content: '';
      position: absolute;
      top: -35px;
      left: -8px;
      width: 16px;
      height: 16px;
      background: #B85042;
      border-radius: 50%;
    }

    .center-circle {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, #2C5F2D, #1E2D2F);
      border-radius: 50%;
      border: 4px solid #97BC62;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
    }

    .spin-btn {
      background: linear-gradient(135deg, #B85042, #943d33);
      color: white;
      border: none;
      padding: 16px 50px;
      font-size: 1.2rem;
      font-weight: 600;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 6px 20px rgba(184, 80, 66, 0.4);
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .spin-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(184, 80, 66, 0.5);
    }

    .spin-btn:active {
      transform: translateY(0);
    }

    .spin-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .result {
      margin-top: 30px;
      text-align: center;
      min-height: 120px;
    }

    .result-topic {
      font-size: 1.5rem;
      font-weight: 700;
      color: #97BC62;
      margin-bottom: 10px;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.5s ease;
    }

    .result-topic.show {
      opacity: 1;
      transform: translateY(0);
    }

    .result-prompt {
      font-size: 1rem;
      opacity: 0.85;
      max-width: 300px;
      line-height: 1.5;
    }

    .footer {
      margin-top: 30px;
      text-align: center;
      font-size: 0.85rem;
      opacity: 0.7;
    }

    .footer a {
      color: #97BC62;
      text-decoration: none;
    }

    /* Colors for segments */
    .seg-0 { background: #2C5F2D; }
    .seg-1 { background: #B85042; }
    .seg-2 { background: #1E2D2F; }
    .seg-3 { background: #97BC62; }
    .seg-4 { background: #3d7a3e; }
    .seg-5 { background: #a05a4d; }
    .seg-6 { background: #2a4547; }
    .seg-7 { background: #7da354; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🍌 Ask Me About My Internship!</h1>
    <p>Spin the wheel to pick a conversation topic</p>
  </div>

  <div class="wheel-container">
    <div class="pointer"></div>
    <div class="wheel" id="wheel">
      <!-- Segments will be added by JS -->
    </div>
    <div class="center-circle">🎯</div>
  </div>

  <button class="spin-btn" id="spinBtn" onclick="spinWheel()">Spin!</button>

  <div class="result">
    <div class="result-topic" id="resultTopic"></div>
    <div class="result-prompt" id="resultPrompt"></div>
  </div>

  <div class="footer">
    <p>Benjamin Wee | FST Industry Day 2026</p>
  </div>

  <script>
    const topics = [
      { 
        name: "Banana Flavour Creation", 
        prompt: "Ask me how I created my own banana milk flavour from GC-MS data!" 
      },
      { 
        name: "Cross-Dept Collaboration", 
        prompt: "Ask me about working with Beverage, Savoury, and Confectionery teams!" 
      },
      { 
        name: "Problem-Solving", 
        prompt: "Ask me how I tackled myrcene solubility issues!" 
      },
      { 
        name: "Learning from Failure", 
        prompt: "Ask me about my chocolate milk disaster and what I learned!" 
      },
      { 
        name: "Sensory Methodology", 
        prompt: "Ask me about running triangle tests for cost validation!" 
      },
      { 
        name: "Flavour Wash (LLE)", 
        prompt: "Ask me about liquid-liquid extraction for a passionfruit flavour!" 
      },
      { 
        name: "Working with Flavourists", 
        prompt: "Ask me about learning from senior flavourists and handling feedback!" 
      },
      { 
        name: "Why Flavourist?", 
        prompt: "Ask me about my career aspirations in the flavour industry!" 
      }
    ];

    const wheel = document.getElementById('wheel');
    const spinBtn = document.getElementById('spinBtn');
    const resultTopic = document.getElementById('resultTopic');
    const resultPrompt = document.getElementById('resultPrompt');
    
    let currentRotation = 0;
    let isSpinning = false;

    // Create wheel segments
    function createWheel() {
      const segmentAngle = 360 / topics.length;
      
      topics.forEach((topic, i) => {
        const segment = document.createElement('div');
        segment.className = `wheel-segment seg-${i}`;
        segment.style.transform = `rotate(${i * segmentAngle}deg)`;
        
        const span = document.createElement('span');
        span.textContent = topic.name;
        segment.appendChild(span);
        
        wheel.appendChild(segment);
      });
    }

    function spinWheel() {
      if (isSpinning) return;
      
      isSpinning = true;
      spinBtn.disabled = true;
      resultTopic.classList.remove('show');
      resultPrompt.textContent = '';
      
      // Calculate spin
      const spinDegrees = 1800 + Math.floor(Math.random() * 1440); // 5-9 full rotations
      currentRotation += spinDegrees;
      
      wheel.style.transform = `rotate(${currentRotation}deg)`;
      
      // Determine result after spin
      setTimeout(() => {
        const segmentAngle = 360 / topics.length;
        const normalizedRotation = currentRotation % 360;
        const pointerAngle = (360 - normalizedRotation + 90) % 360; // Pointer is at top
        const winningIndex = Math.floor(pointerAngle / segmentAngle) % topics.length;
        
        const winner = topics[winningIndex];
        
        resultTopic.textContent = `🎉 ${winner.name}`;
        resultPrompt.textContent = winner.prompt;
        resultTopic.classList.add('show');
        
        isSpinning = false;
        spinBtn.disabled = false;
      }, 4200);
    }

    // Initialize
    createWheel();
  </script>
</body>
</html>
